<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <dir>.</dir>

  <!-- Inter Black → family "InterBlack" -->
  <match target="pattern">
    <test name="family"><string>InterBlack</string></test>
    <edit name="file" mode="prepend"><string>./Inter-Black.ttf</string></edit>
  </match>

  <!-- Inter Bold → family "InterBold" -->
  <match target="pattern">
    <test name="family"><string>InterBold</string></test>
    <edit name="file" mode="prepend"><string>./Inter-Bold.ttf</string></edit>
  </match>
</fontconfig>
